name: Deploy Flutter Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'frontend_admin/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Pull latest code
        uses: actions/checkout@v3

      # Executes locally on your Mac Mini runner using your machine's Flutter SDK
      - name: Compile Flutter Web App
        run: |
          cd frontend_admin
          flutter pub get
          flutter build web --release

      # Packages compiled app into Nginx and pushes both unique SHA and latest tags
      - name: Build and Push Nginx Docker Image
        run: |
          cd frontend_admin
          
          # 1. Build and tag with BOTH the commit SHA and latest fallback
          docker build --platform linux/amd64 \
            -t chrisbotor/mv-frontend-admin:${{ github.sha }} \
            -t chrisbotor/mv-frontend-admin:latest .
          
          # 2. Push both target tags up to your Docker Hub repository
          docker push chrisbotor/mv-frontend-admin:${{ github.sha }}
          docker push chrisbotor/mv-frontend-admin:latest

      # Tells the Beelink cluster to apply the update seamlessly to your LIVE pod
      - name: Hot-Swap Kubernetes Deployment
        run: |
          kubectl set image deployment/admin-frontend "*=chrisbotor/mv-frontend-admin:${{ github.sha }}"

      - name: Verify Frontend Deployment Success
        run: |
          kubectl rollout status deployment/admin-frontend --timeout=60s

      - name: Capture Crash Logs on Failure
        if: failure()
        run: |
          echo "⚠️ Deployment failed! Fetching Nginx logs from the crashing frontend pod..."
          
          # Find the absolute newest admin-frontend pod that was just created
          CRASHED_POD=$(kubectl get pods --sort-by=.metadata.creationTimestamp | grep admin-frontend | tail -n 1 | awk '{print $1}')
          
          echo "Dumping logs for: $CRASHED_POD"
          echo "=========================================================="
          
          # Try to get the previous crashed instance logs, or the current failing one
          kubectl logs $CRASHED_POD --previous || kubectl logs $CRASHED_POD
          
          echo "=========================================================="    
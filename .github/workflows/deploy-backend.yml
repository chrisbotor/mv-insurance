name: Deploy FastAPI Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend-api/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  build-and-deploy:
    runs-on: self-hosted 

    steps:
      - name: Pull latest code
        uses: actions/checkout@v3

      - name: Build and Push Docker Image
        run: |
          cd backend-api
          docker build --platform linux/amd64 -t chrisbotor/mv-backend-api:${{ github.sha }} .
          docker push chrisbotor/mv-backend-api:${{ github.sha }}

      - name: Hot-Swap Kubernetes
        run: |
          kubectl set image deployment/backend-api backend-api=chrisbotor/mv-backend-api:${{ github.sha }}
      
      - name: Verify Backend Deployment Success
        run: |
          kubectl rollout status deployment/backend-api --timeout=60s
          
          echo "Rollout reported success. Waiting 15 seconds for stabilization..."
          sleep 15
          
          # Manually check if any backend pods slipped into an Error state
          CRASHING_PODS=$(kubectl get pods | grep backend-api | grep -E 'Error|CrashLoopBackOff' || true)
          
          if [ -n "$CRASHING_PODS" ]; then
            echo "❌ CRITICAL: Pod crashed shortly after startup!"
            echo "$CRASHING_PODS"
            exit 1 # This forces the pipeline step to fail
          else
            echo "✅ Pods are stable and running."
          fi

      # 3. THE SAFETY NET: Capture logs if either the rollout OR stabilization fails
      - name: Capture Crash Logs on Failure
        if: failure()
        run: |
          echo "⚠️ Deployment failed! Fetching logs from the crashing pod..."
          CRASHED_POD=$(kubectl get pods --sort-by=.metadata.creationTimestamp | grep backend-api | tail -n 1 | awk '{print $1}')
          
          echo "Dumping logs for: $CRASHED_POD"
          echo "=========================================================="
          kubectl logs $CRASHED_POD --previous || kubectl logs $CRASHED_POD
          echo "=========================================================="
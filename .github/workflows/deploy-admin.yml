name: Deploy Admin CRM

on:
  push:
    branches:
      - main
    paths:
      - 'frontend_admin/**'  # Watches the correct folder name
      - '.github/workflows/deploy-admin.yml' # Also triggers if you edit this file

jobs:
  build-and-deploy:
    runs-on: self-hosted 

    steps:
      - name: Pull latest code
        uses: actions/checkout@v3

      - name: Build Flutter Web Presentation
        run: |
          cd frontend_admin  # Updated path
          flutter build web --release

      - name: Build and Push Docker Image
        run: |
          cd frontend_admin  # Updated path
          docker build --platform linux/amd64 -t chrisbotor/mv-admin-frontend:${{ github.sha }} .
          docker push chrisbotor/mv-admin-frontend:${{ github.sha }}

      - name: Hot-Swap Kubernetes
        run: |
          kubectl set image deployment/admin-frontend admin-frontend=chrisbotor/mv-admin-frontend:${{ github.sha }}